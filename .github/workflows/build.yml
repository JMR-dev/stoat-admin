name: Build And Push

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/stoat-admin-api:latest
            ghcr.io/${{ github.repository_owner }}/stoat-admin-api:${{ github.sha }}

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          build-args: |
            VITE_API_URL=http://127.0.0.1:5181
          tags: |
            ghcr.io/${{ github.repository_owner }}/stoat-admin-web:latest
            ghcr.io/${{ github.repository_owner }}/stoat-admin-web:${{ github.sha }}
